# ==============================================================================
# onvif_simple_server.conf
#
# Exposes MediaMTX RTSP streams as an ONVIF Profile S/T device so NVRs
# (e.g. Dahua) can discover and record without manual RTSP URL entry.
#
# Architecture:
#   lighttpd (HTTP) -> onvif_simple_server (CGI) handles ONVIF SOAP requests
#   wsd_simple_server                            handles WS-Discovery (UDP 3702)
#   MediaMTX                                     serves the actual RTSP streams
#
# Setup:
#   1. Build from source: github.com/roleoroleo/onvif_simple_server
#      (no prebuilt ARM64 binaries -- must compile for aarch64)
#   2. Install lighttpd: sudo apt install lighttpd
#   3. Configure lighttpd to serve onvif_simple_server as CGI under /onvif/
#   4. Run: ./start_onvif.sh
#
# NVR connection (after start):
#   ONVIF URL : http://JETSON_IP:8080/onvif/device_service
#   Username  : (none -- open by default; set user/password below to restrict)
# ==============================================================================


# ------------------------------------------------------------------------------
# Device identity (shown in NVR device list)
# ------------------------------------------------------------------------------
model=Jetson-Basler-4K
manufacturer=Custom
firmware_ver=0.2
hardware_id=JetsonOrinNX
serial_num=000000000001


# ------------------------------------------------------------------------------
# Network
# ------------------------------------------------------------------------------
ifs=eth0            # network interface facing the NVR
port=8080           # HTTP port for ONVIF SOAP endpoint


# ------------------------------------------------------------------------------
# ONVIF scopes
# Profile/S  : standard streaming profile (H.264/H.265 via RTSP)
# Profile/T  : required for H.265 (Media2 service)
# ------------------------------------------------------------------------------
scope=onvif://www.onvif.org/Profile/Streaming
scope=onvif://www.onvif.org/Profile/S
scope=onvif://www.onvif.org/Profile/T

# Enable Media2 service -- required for Profile T / H.265 support
adv_enable_media2=1


# ------------------------------------------------------------------------------
# Authentication (uncomment to restrict access)
# ------------------------------------------------------------------------------
#user=admin
#password=admin


# ------------------------------------------------------------------------------
# MAIN stream -- H.265 4K -> /main
# %s is replaced at runtime with the device IP seen by the NVR
# ------------------------------------------------------------------------------
name=Profile_Main
width=4096
height=2160
url=rtsp://%s:8554/main
snapurl=
type=H265
audio_encoder=NONE
audio_decoder=NONE


# ------------------------------------------------------------------------------
# SUB stream -- H.264 1080p -> /sub
# ------------------------------------------------------------------------------
name=Profile_Sub
width=1920
height=1080
url=rtsp://%s:8554/sub
snapurl=
type=H264
audio_encoder=NONE
audio_decoder=NONE
