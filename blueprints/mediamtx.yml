rtspAddress: :8554
rtpAddress: :8010
rtcpAddress: :8011
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: yes

# readBufferCount/writeQueueSize left at MediaMTX defaults (512).
# Values below 512 caused "fetching next packet failed" under sustained high bitrate.

paths:
  main:

  main-auth:
    readUser: guest
    readPass: guest
    source: rtsp://127.0.0.1:8554/main

  sub:

  sub-auth:
    readUser: guest
    readPass: guest
    source: rtsp://127.0.0.1:8554/sub
