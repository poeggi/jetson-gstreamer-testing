rtspAddress: :8554
rtpAddress: :8010
rtcpAddress: :8011
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: yes

# readBufferCount/writeQueueSize left at MediaMTX defaults (512).
# Values below 512 caused "fetching next packet failed" at 28 Mbps H.264.

paths:
  main:

  main-auth:
    source: rtsp://127.0.0.1:8554/main
    readUser: guest
    readPass: guest

  sub:

  sub-auth:
    source: rtsp://127.0.0.1:8554/sub
    readUser: guest
    readPass: guest

  main-auth:
    source: rtsp://127.0.0.1:8554/main
    readUser: guest
    readPass: guest
