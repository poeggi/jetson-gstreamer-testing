# ==============================================================================
# stream.conf -- configuration for send_stream.sh
#
# Format: bash key=value (sourced directly by send_stream.sh).
# True YAML is not used -- bash has no native YAML parser and yq is not
# guaranteed to be installed on the Jetson.
# ==============================================================================


# ------------------------------------------------------------------------------
# Camera
# ------------------------------------------------------------------------------
CAMERA_SERIAL=""        # leave empty to auto-detect first Basler USB camera
                        # find serial: gst-launch-1.0 pylonsrc num-buffers=1 ! fakesink

FRAMERATE=30            # camera hardware-fixed rate; caps value is metadata only
PIXEL_FORMAT=YUY2       # capture format -- must be VIC-compatible in NVMM
                        # YUY2: YUV 4:2:2, 2 bytes/px, confirmed working
                        # UYVY: alternative byte order if YUY2 causes issues


# ------------------------------------------------------------------------------
# MAIN stream -- 4K H.265 -> /main
# ------------------------------------------------------------------------------
MAIN_ENABLED=true       # true | false
MAIN_WIDTH=4096
MAIN_HEIGHT=2160
MAIN_ENCODER=h265       # h264 | h265
MAIN_BITRATE=20000000   # 20 Mbps -- good quality at 4K/30fps; reduce to 16 Mbps for storage-constrained setups
MAIN_IFRAME_INTERVAL=15 # IDR every 15 frames (2/sec at 30fps)
MAIN_CONTROL_RATE=1     # 1=CBR (recommended for RTSP)  2=VBR
MAIN_RTSP_PATH=/main


# ------------------------------------------------------------------------------
# SUB stream -- 1080p H.264 -> /sub
# ------------------------------------------------------------------------------
SUB_ENABLED=true        # true | false
SUB_WIDTH=1920
SUB_HEIGHT=1080
SUB_ENCODER=h264        # h264 | h265
SUB_BITRATE=9000000     # 9 Mbps -- good quality at 1080p/30fps H.264
SUB_IFRAME_INTERVAL=15
SUB_CONTROL_RATE=1
SUB_RTSP_PATH=/sub


# ------------------------------------------------------------------------------
# Common output settings
# ------------------------------------------------------------------------------
OUTPUT_MODE=rtsp        # rtsp | fakesink
RTSP_HOST=127.0.0.1
RTSP_PORT=8554
# RTSP auth credentials (for /main-auth and /sub-auth paths) are in mediamtx.yml


# ------------------------------------------------------------------------------
# ONVIF server -- NVR auto-discovery and stream registration
# Requires: onvif_simple_server + wsd_simple_server + lighttpd
# Build from source: github.com/roleoroleo/onvif_simple_server
# Config is generated at runtime from stream.conf -- no separate conf file needed.
# ------------------------------------------------------------------------------
ONVIF_ENABLED=true          # true | false
ONVIF_PORT=8080             # HTTP port for ONVIF SOAP endpoint
ONVIF_INTERFACE=eth0        # network interface facing the NVR (for WS-Discovery XADDR URL)
ONVIF_USER=guest            # ONVIF auth username (leave empty to disable auth)
ONVIF_PASSWORD=guest        # ONVIF auth password
ONVIF_SERIAL=SN1234567890   # unique serial per unit -- set to board serial to avoid NVR confusion
                            # auto-detect: ./check_system.sh --autofix-persist
